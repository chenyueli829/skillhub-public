name: eval-preview

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install -r requirements.txt
      - name: Validate catalog
        run: python scripts/validate_catalog.py
      - name: Generate smoke artifacts
        run: python -m eval.harness.run --skill newsletter-generation --suite smoke --output results/latest
      - name: Build leaderboard
        run: python -m leaderboard.build --results results/latest --catalog catalog --out results/latest

